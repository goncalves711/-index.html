<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Financeiro — Meu App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-page:#f5f5f3;--bg-card:#fff;--bg-secondary:#f0f0ee;--bg-input:#fff;
  --text-primary:#1a1a1a;--text-secondary:#666;--text-muted:#999;
  --border:#e0e0dd;--border-strong:rgba(0,0,0,0.25);
  --green-bg:#EAF3DE;--green-text:#3B6D11;--green-mid:#639922;
  --red-bg:#FCEBEB;--red-text:#A32D2D;--red-mid:#E24B4A;
  --blue-bg:#E6F1FB;--blue-text:#185FA5;--blue-mid:#378ADD;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --purple-bg:#EEEDFE;--purple-text:#534AB7;
  --radius-md:8px;--radius-lg:12px;--radius-xl:16px;
}
body.dark{
  --bg-page:#111;--bg-card:#1e1e1e;--bg-secondary:#2a2a2a;--bg-input:#252525;
  --text-primary:#f0f0ee;--text-secondary:#aaa;--text-muted:#666;
  --border:#333;--border-strong:rgba(255,255,255,0.2);
  --green-bg:#1a2e0f;--green-text:#97C459;--green-mid:#639922;
  --red-bg:#2e0f0f;--red-text:#F09595;--red-mid:#E24B4A;
  --blue-bg:#0a1e35;--blue-text:#85B7EB;--blue-mid:#378ADD;
  --amber-bg:#2e1e05;--amber-text:#FAC775;
  --purple-bg:#1a1840;--purple-text:#AFA9EC;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg-page);color:var(--text-primary);min-height:100vh;transition:background .2s,color .2s}

/* HEADER */
.header{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:.85rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header h1{font-size:16px;font-weight:500;display:flex;align-items:center;gap:8px}
.hdr-right{display:flex;gap:8px;align-items:center}
.back-link{color:var(--text-primary);text-decoration:none;font-size:22px;line-height:1}

/* BOTÕES */
.btn{background:transparent;border:0.5px solid var(--border-strong);border-radius:var(--radius-md);padding:7px 13px;font-size:13px;cursor:pointer;color:var(--text-primary);transition:background .15s}
.btn:hover{background:var(--bg-secondary)}
.btn-primary{background:var(--text-primary);color:var(--bg-card);border-color:transparent}
.btn-primary:hover{opacity:.85}
.btn-icon{width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;font-size:17px;border-radius:var(--radius-md);border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--text-primary)}

/* TABS */
.tabs{display:flex;background:var(--bg-secondary);border-radius:10px;padding:3px;margin:1rem 1rem .25rem;gap:2px}
.tab{flex:1;padding:7px 4px;text-align:center;font-size:12px;border:none;background:transparent;cursor:pointer;border-radius:7px;color:var(--text-secondary);transition:all .15s}
.tab.active{background:var(--bg-card);color:var(--text-primary);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* CONTEÚDO */
.content{padding:.75rem 1rem 5rem;display:flex;flex-direction:column;gap:.85rem;max-width:480px;margin:0 auto}

/* CARDS */
.card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.1rem}
.card-title{font-size:12px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.75rem}

/* MÉTRICAS */
.metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.mc{background:var(--bg-secondary);border-radius:var(--radius-md);padding:.75rem 1rem}
.mc.full{grid-column:1/-1}
.mc-label{font-size:11px;color:var(--text-secondary);margin-bottom:3px}
.mc-value{font-size:19px;font-weight:500}

/* CORES */
.c-green{color:var(--green-text)}.c-red{color:var(--red-text)}.c-blue{color:var(--blue-text)}.c-amber{color:var(--amber-text)}

/* GRÁFICO */
.chart-wrap{position:relative;width:100%;height:190px}

/* LISTA */
.lista{display:flex;flex-direction:column}
.item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.item:last-child{border-bottom:none}
.item-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.item-body{flex:1;min-width:0}
.item-desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.item-val{font-size:14px;font-weight:500;white-space:nowrap}
.item-del{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:17px;padding:2px 6px;border-radius:6px;flex-shrink:0}
.item-del:hover{background:var(--bg-secondary)}

/* BADGES */
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-right:3px}
.badge-r{background:var(--green-bg);color:var(--green-text)}
.badge-d{background:var(--red-bg);color:var(--red-text)}
.badge-p{background:var(--amber-bg);color:var(--amber-text)}
.badge-info{background:var(--blue-bg);color:var(--blue-text)}

/* FILTROS */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.6rem}
.ftab{padding:4px 11px;border-radius:20px;border:0.5px solid var(--border);background:transparent;font-size:12px;cursor:pointer;color:var(--text-secondary)}
.ftab.active{background:var(--text-primary);color:var(--bg-card);border-color:transparent}

/* CONTAS VENCIMENTO */
.venc-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.venc-item:last-child{border-bottom:none}
.venc-body{flex:1;min-width:0}
.venc-desc{font-size:14px;font-weight:500}
.venc-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.venc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.venc-val{font-size:14px;font-weight:500}
.venc-actions{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.btn-wpp{background:#25D366;color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer}
.btn-pagar{background:var(--bg-secondary);border:0.5px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;color:var(--text-primary)}
.btn-pagar:hover{background:var(--green-bg);color:var(--green-text)}
.status-pago{font-size:11px;color:var(--green-text);background:var(--green-bg);padding:2px 7px;border-radius:4px}

/* AVISO */
.aviso-banner{background:var(--amber-bg);border:0.5px solid var(--amber-text);border-radius:var(--radius-md);padding:.7rem .9rem;display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--amber-text)}
.av-list{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.av-item{font-size:12px;display:flex;gap:6px;align-items:center}

/* MES NAV */
.mes-nav{display:flex;align-items:center;justify-content:space-between}
.mes-label{font-size:14px;font-weight:500}
.nav-btn{background:none;border:0.5px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:15px;color:var(--text-primary)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--bg-card);border-radius:20px 20px 0 0;padding:1.25rem 1rem 2.5rem;width:100%;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s}
.overlay.show .modal{transform:translateY(0)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.modal-title{font-size:16px;font-weight:500}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-secondary);line-height:1}

/* FORM */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg label{font-size:12px;color:var(--text-secondary)}
.fg input,.fg select{border:0.5px solid var(--border-strong);border-radius:var(--radius-md);padding:9px 12px;font-size:14px;background:var(--bg-input);color:var(--text-primary);width:100%}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tipo-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tipo-btn{padding:9px;border-radius:var(--radius-md);border:0.5px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--text-secondary);transition:all .15s}
.tipo-btn.ar{background:var(--green-bg);border-color:var(--green-text);color:var(--green-text);font-weight:500}
.tipo-btn.ad{background:var(--red-bg);border-color:var(--red-text);color:var(--red-text);font-weight:500}
.tipo-btn.ap{background:var(--amber-bg);border-color:var(--amber-text);color:var(--amber-text);font-weight:500}
.tipo-btn.arec{background:var(--blue-bg);border-color:var(--blue-text);color:var(--blue-text);font-weight:500}
.rec-opts{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px;display:flex;flex-direction:column;gap:8px}
.rec-row{display:flex;gap:8px}
.rec-chip{flex:1;padding:7px;text-align:center;border:0.5px solid var(--border);border-radius:var(--radius-md);font-size:12px;cursor:pointer;background:transparent;color:var(--text-secondary)}
.rec-chip.active{background:var(--text-primary);color:var(--bg-card);border-color:transparent}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.toggle-row label{font-size:13px}
.toggle{position:relative;width:42px;height:24px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:12px;cursor:pointer;transition:.2s}
.toggle-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--green-mid)}
.toggle input:checked+.toggle-slider::before{transform:translateX(18px)}

/* FAB */
.fab{position:fixed;bottom:1.5rem;right:1.25rem;z-index:40;width:52px;height:52px;border-radius:50%;background:var(--text-primary);color:var(--bg-card);border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.fab-menu{position:fixed;bottom:6rem;right:1.25rem;z-index:40;display:flex;flex-direction:column;gap:8px;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.fab-menu.show{opacity:1;pointer-events:all}
.fab-opt{display:flex;align-items:center;gap:8px;cursor:pointer}
.fab-opt-label{background:var(--bg-card);border:0.5px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.fab-opt-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.15)}

/* MISC */
.empty{text-align:center;padding:1.5rem;color:var(--text-muted);font-size:13px}
.loading{text-align:center;padding:1rem;color:var(--text-muted);font-size:13px}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1><a href="/index.html" class="back-link">&#8592;</a> Financeiro</h1>
  <div class="hdr-right">
    <button class="btn-icon" id="theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="btn-icon" onclick="abrirCat()" title="Categorias">🏷</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="setTab('resumo',this)">Resumo</button>
  <button class="tab" onclick="setTab('transacoes',this)">Transações</button>
  <button class="tab" onclick="setTab('contas',this)">Contas</button>
</div>

<!-- CONTEÚDO -->
<div class="content">

  <!-- ABA RESUMO -->
  <div id="tab-resumo">
    <div class="mes-nav">
      <button class="nav-btn" onclick="mudarMes(-1)">&#8249;</button>
      <span class="mes-label" id="mes-label"></span>
      <button class="nav-btn" onclick="mudarMes(1)">&#8250;</button>
    </div>
    <div class="metrics" style="margin-top:.75rem">
      <div class="mc"><div class="mc-label">Receitas</div><div class="mc-value c-green" id="m-rec">R$ 0</div></div>
      <div class="mc"><div class="mc-label">Despesas</div><div class="mc-value c-red" id="m-desp">R$ 0</div></div>
      <div class="mc full"><div class="mc-label">Saldo do mês</div><div class="mc-value c-blue" id="m-saldo">R$ 0</div></div>
    </div>
    <div id="avisos-banner"></div>
    <div class="card">
      <div class="card-title">Gastos por categoria</div>
      <div class="chart-wrap"><canvas id="grafico" role="img" aria-label="Gastos por categoria">Sem dados</canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Contas próximas (7 dias)</div>
      <div id="resumo-contas"><div class="loading">Carregando...</div></div>
    </div>
  </div>

  <!-- ABA TRANSAÇÕES -->
  <div id="tab-transacoes" class="hidden">
    <div class="mes-nav">
      <button class="nav-btn" onclick="mudarMes(-1)">&#8249;</button>
      <span class="mes-label" id="mes-label2"></span>
      <button class="nav-btn" onclick="mudarMes(1)">&#8250;</button>
    </div>
    <div class="filter-row" style="margin-top:.6rem">
      <button class="ftab active" onclick="filtrar('todas',this)">Todas</button>
      <button class="ftab" onclick="filtrar('receita',this)">Receitas</button>
      <button class="ftab" onclick="filtrar('despesa',this)">Despesas</button>
      <button class="ftab" onclick="filtrar('fixa',this)">Fixas</button>
      <button class="ftab" onclick="filtrar('parcelada',this)">Parceladas</button>
    </div>
    <div class="card">
      <div class="lista" id="lista-trans"><div class="loading">Carregando...</div></div>
    </div>
  </div>

  <!-- ABA CONTAS -->
  <div id="tab-contas" class="hidden">
    <div class="filter-row">
      <button class="ftab active" onclick="filtrarContas('todas',this)">Todas</button>
      <button class="ftab" onclick="filtrarContas('pagar',this)">A Pagar</button>
      <button class="ftab" onclick="filtrarContas('receber',this)">A Receber</button>
      <button class="ftab" onclick="filtrarContas('pendente',this)">Pendentes</button>
      <button class="ftab" onclick="filtrarContas('pago',this)">Quitadas</button>
    </div>
    <div class="card">
      <div class="lista" id="lista-contas"><div class="loading">Carregando...</div></div>
    </div>
  </div>

</div>

<!-- FAB -->
<div class="fab-menu" id="fab-menu">
  <div class="fab-opt" onclick="abrirTransacao()">
    <span class="fab-opt-label">Nova transação</span>
    <button class="fab-opt-btn" style="background:var(--green-bg);color:var(--green-text)">💸</button>
  </div>
  <div class="fab-opt" onclick="abrirConta()">
    <span class="fab-opt-label">Nova conta</span>
    <button class="fab-opt-btn" style="background:var(--amber-bg);color:var(--amber-text)">📋</button>
  </div>
</div>
<button class="fab" id="fab-btn" onclick="toggleFab()">+</button>

<!-- MODAL TRANSAÇÃO -->
<div class="overlay" id="ov-trans" onclick="fecharOv(event,'ov-trans')">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">Nova transação</span>
      <button class="modal-close" onclick="fechar('ov-trans')">&#215;</button>
    </div>
    <div class="fg"><label>Tipo</label>
      <div class="tipo-toggle">
        <button class="tipo-btn ar" id="btn-r" onclick="setTipo('receita')">&#8593; Receita</button>
        <button class="tipo-btn" id="btn-d" onclick="setTipo('despesa')">&#8595; Despesa</button>
      </div>
    </div>
    <div class="fg"><label>Descrição</label><input id="t-desc" placeholder="Ex: Salário, Aluguel..."/></div>
    <div class="row2">
      <div class="fg"><label>Valor (R$)</label><input id="t-valor" type="number" min="0" step="0.01" placeholder="0,00"/></div>
      <div class="fg"><label>Data</label><input id="t-data" type="date"/></div>
    </div>
    <div class="fg"><label>Categoria</label><select id="t-cat"><option value="">Selecione...</option></select></div>
    <div class="toggle-row">
      <label>Recorrência / Parcelamento</label>
      <label class="toggle"><input type="checkbox" id="t-rec-toggle" onchange="toggleRec()"><span class="toggle-slider"></span></label>
    </div>
    <div id="rec-box" style="display:none" class="rec-opts">
      <div class="rec-row">
        <button class="rec-chip active" id="chip-fixa" onclick="setRec('fixa')">🔄 Fixa mensal</button>
        <button class="rec-chip" id="chip-parc" onclick="setRec('parcelada')">💳 Parcelada</button>
      </div>
      <div id="parc-box" style="display:none" class="fg"><label>Nº de parcelas</label><input id="t-parcelas" type="number" min="2" max="120" placeholder="Ex: 12"/></div>
    </div>
    <button class="btn btn-primary" style="width:100%;padding:12px;margin-top:8px" onclick="salvarTrans()" id="btn-st">Salvar</button>
  </div>
</div>

<!-- MODAL CONTA -->
<div class="overlay" id="ov-conta" onclick="fecharOv(event,'ov-conta')">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">Nova conta</span>
      <button class="modal-close" onclick="fechar('ov-conta')">&#215;</button>
    </div>
    <div class="fg"><label>Tipo</label>
      <div class="tipo-toggle">
        <button class="tipo-btn ap" id="btn-cp" onclick="setTipoConta('pagar')">&#128228; A Pagar</button>
        <button class="tipo-btn" id="btn-cr" onclick="setTipoConta('receber')">&#128229; A Receber</button>
      </div>
    </div>
    <div class="fg"><label>Descrição</label><input id="c-desc" placeholder="Ex: Conta de luz, Fatura..."/></div>
    <div class="row2">
      <div class="fg"><label>Valor (R$)</label><input id="c-valor" type="number" min="0" step="0.01" placeholder="0,00"/></div>
      <div class="fg"><label>Vencimento</label><input id="c-venc" type="date"/></div>
    </div>
    <div class="fg"><label>Categoria</label><select id="c-cat"><option value="">Selecione...</option></select></div>
    <div class="row2">
      <div class="fg"><label>Avisar (dias antes)</label><input id="c-aviso" type="number" min="0" max="30" value="3"/></div>
      <div class="fg"><label>WhatsApp (opcional)</label><input id="c-wpp" type="tel" placeholder="84999999999"/></div>
    </div>
    <button class="btn btn-primary" style="width:100%;padding:12px;margin-top:8px" onclick="salvarConta()" id="btn-sc">Salvar</button>
  </div>
</div>

<!-- MODAL CATEGORIAS -->
<div class="overlay" id="ov-cat" onclick="fecharOv(event,'ov-cat')">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">Categorias personalizadas</span>
      <button class="modal-close" onclick="fechar('ov-cat')">&#215;</button>
    </div>
    <div class="fg"><label>Nome da categoria</label><input id="cat-nome" placeholder="Ex: Pets, Viagem..."/></div>
    <div class="fg"><label>Tipo</label>
      <select id="cat-tipo">
        <option value="ambos">Receita e Despesa</option>
        <option value="receita">Só Receita</option>
        <option value="despesa">Só Despesa</option>
      </select>
    </div>
    <button class="btn btn-primary" style="width:100%;padding:10px" onclick="salvarCat()">Adicionar</button>
    <div style="margin-top:1rem;font-size:12px;color:var(--text-secondary);margin-bottom:.4rem">Categorias salvas</div>
    <div id="lista-cats" class="lista"></div>
  </div>
</div>

<script>
// ─── CONFIG SUPABASE ───────────────────────────────────────
const SURL = 'https://azznjpuydyyynszhzets.supabase.co';
const SKEY = 'sb_publishable_EqXJyaKUkoxEolRj80nPOQ_-9LGNHlG';
const { createClient } = supabase;
const db = createClient(SURL, SKEY);

// ─── CONSTANTES ────────────────────────────────────────────
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CATS = {
  receita: ['Salário','Freelance','Investimentos','Aluguel recebido','Presente','Outros'],
  despesa: ['Alimentação','Transporte','Moradia','Saúde','Educação','Lazer','Vestuário','Assinaturas','Pets','Viagem','Outros']
};
const CORES = ['#185FA5','#3B6D11','#A32D2D','#BA7517','#993356','#534AB7','#0F6E56','#712B13','#636363','#D85A30','#1D9E75','#D4537E'];

// ─── ESTADO ────────────────────────────────────────────────
let transacoes = [], contas = [], categorias = [];
let mes = new Date().getMonth(), ano = new Date().getFullYear();
let filtroTrans = 'todas', filtroContas = 'todas';
let tipoTrans = 'receita', tipoConta = 'pagar', tipoRec = 'fixa';
let grafico = null, fabOpen = false;

// ─── TEMA ──────────────────────────────────────────────────
function toggleTheme() {
  document.body.classList.toggle('dark');
  const d = document.body.classList.contains('dark');
  document.getElementById('theme-btn').textContent = d ? '☀️' : '🌙';
  localStorage.setItem('tema', d ? 'dark' : 'light');
}
(function () {
  if (localStorage.getItem('tema') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('theme-btn').textContent = '☀️';
  }
})();

// ─── TABS ──────────────────────────────────────────────────
function setTab(id, el) {
  ['resumo','transacoes','contas'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== id);
  });
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ─── MÊS ───────────────────────────────────────────────────
function mudarMes(d) {
  mes += d;
  if (mes > 11) { mes = 0; ano++; }
  if (mes < 0)  { mes = 11; ano--; }
  const lbl = MESES[mes] + ' ' + ano;
  document.getElementById('mes-label').textContent = lbl;
  document.getElementById('mes-label2').textContent = lbl;
  carregar();
}

// ─── UTILS ─────────────────────────────────────────────────
const fmt    = v => 'R$ ' + Math.abs(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDt  = d => new Date(d + 'T12:00:00').toLocaleDateString('pt-BR');
const diasAte = d => Math.round((new Date(d + 'T12:00:00') - Object.assign(new Date(), { hours: 0, minutes: 0, seconds: 0, ms: 0 })) / 86400000);

// ─── FAB ───────────────────────────────────────────────────
function toggleFab() {
  fabOpen = !fabOpen;
  document.getElementById('fab-menu').classList.toggle('show', fabOpen);
  document.getElementById('fab-btn').textContent = fabOpen ? '×' : '+';
}
function closeFab() { fabOpen = false; document.getElementById('fab-menu').classList.remove('show'); document.getElementById('fab-btn').textContent = '+'; }

// ─── OVERLAY ───────────────────────────────────────────────
const abrirOv  = id => document.getElementById(id).classList.add('show');
const fechar   = id => document.getElementById(id).classList.remove('show');
const fecharOv = (e, id) => { if (e.target.id === id) fechar(id); };

// ─── MODAL TRANSAÇÃO ───────────────────────────────────────
function abrirTransacao() {
  closeFab(); limparTrans();
  preencherCats('t-cat', 'despesa');
  document.getElementById('t-data').value = new Date().toISOString().split('T')[0];
  abrirOv('ov-trans');
}
function limparTrans() {
  ['t-desc','t-valor','t-parcelas'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('t-rec-toggle').checked = false;
  document.getElementById('rec-box').style.display = 'none';
  setTipo('receita');
}
function setTipo(t) {
  tipoTrans = t;
  document.getElementById('btn-r').className = 'tipo-btn' + (t === 'receita' ? ' ar' : '');
  document.getElementById('btn-d').className = 'tipo-btn' + (t === 'despesa' ? ' ad' : '');
  preencherCats('t-cat', t);
}
function toggleRec() {
  document.getElementById('rec-box').style.display = document.getElementById('t-rec-toggle').checked ? 'block' : 'none';
}
function setRec(t) {
  tipoRec = t;
  document.getElementById('chip-fixa').className = 'rec-chip' + (t === 'fixa' ? ' active' : '');
  document.getElementById('chip-parc').className = 'rec-chip' + (t === 'parcelada' ? ' active' : '');
  document.getElementById('parc-box').style.display = t === 'parcelada' ? 'flex' : 'none';
}

// ─── MODAL CONTA ───────────────────────────────────────────
function abrirConta() {
  closeFab(); limparConta();
  preencherCats('c-cat', 'despesa');
  document.getElementById('c-venc').value = new Date().toISOString().split('T')[0];
  abrirOv('ov-conta');
}
function limparConta() {
  ['c-desc','c-valor','c-wpp'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('c-aviso').value = '3';
  setTipoConta('pagar');
}
function setTipoConta(t) {
  tipoConta = t;
  document.getElementById('btn-cp').className = 'tipo-btn' + (t === 'pagar' ? ' ap' : '');
  document.getElementById('btn-cr').className = 'tipo-btn' + (t === 'receber' ? ' arec' : '');
}

// ─── CATEGORIAS ────────────────────────────────────────────
function preencherCats(id, tipo) {
  const sel = document.getElementById(id);
  const val = sel.value;
  sel.innerHTML = '<option value="">Selecione...</option>';
  const pad = tipo === 'receita' ? CATS.receita : tipo === 'despesa' ? CATS.despesa : [...CATS.receita, ...CATS.despesa];
  pad.forEach(c => { const o = document.createElement('option'); o.value = o.textContent = c; sel.appendChild(o); });
  categorias.filter(c => c.tipo === tipo || c.tipo === 'ambos').forEach(c => {
    const o = document.createElement('option'); o.value = c.nome; o.textContent = '⭐ ' + c.nome; sel.appendChild(o);
  });
  if (val) sel.value = val;
}

function abrirCat() { carregarCats(); abrirOv('ov-cat'); }

async function carregarCats() {
  const { data } = await db.from('categorias').select('*').order('nome');
  categorias = data || [];
  const el = document.getElementById('lista-cats');
  if (!categorias.length) { el.innerHTML = '<div class="empty">Nenhuma categoria ainda</div>'; return; }
  el.innerHTML = categorias.map(c => `
    <div class="item">
      <div class="item-body">
        <div class="item-desc">${c.nome}</div>
        <div class="item-meta">${c.tipo === 'ambos' ? 'Receita e Despesa' : c.tipo === 'receita' ? 'Receita' : 'Despesa'}</div>
      </div>
      <button class="item-del" onclick="delCat('${c.id}')">&#215;</button>
    </div>`).join('');
}

async function salvarCat() {
  const nome = document.getElementById('cat-nome').value.trim();
  const tipo = document.getElementById('cat-tipo').value;
  if (!nome) return;
  await db.from('categorias').insert([{ nome, tipo }]);
  document.getElementById('cat-nome').value = '';
  carregarCats();
}

async function delCat(id) { await db.from('categorias').delete().eq('id', id); carregarCats(); }

// ─── CARREGAR DADOS ────────────────────────────────────────
async function carregar() {
  const ini = `${ano}-${String(mes + 1).padStart(2,'0')}-01`;
  const fim = `${ano}-${String(mes + 1).padStart(2,'0')}-31`;
  const [r1, r2, r3] = await Promise.all([
    db.from('transacoes').select('*').gte('data', ini).lte('data', fim).order('data', { ascending: false }),
    db.from('contas').select('*').order('vencimento', { ascending: true }),
    db.from('categorias').select('*').order('nome')
  ]);
  transacoes = r1.data || [];
  contas     = r2.data || [];
  categorias = r3.data || [];
  renderTrans();
  renderContas();
  atualizarMetricas();
  atualizarGrafico();
  renderResumoContas();
  renderAvisos();
}

// ─── MÉTRICAS ──────────────────────────────────────────────
function atualizarMetricas() {
  const rec  = transacoes.filter(t => t.tipo === 'receita').reduce((s,t) => s + Number(t.valor), 0);
  const desp = transacoes.filter(t => t.tipo === 'despesa').reduce((s,t) => s + Number(t.valor), 0);
  const saldo = rec - desp;
  document.getElementById('m-rec').textContent  = fmt(rec);
  document.getElementById('m-desp').textContent = fmt(desp);
  const se = document.getElementById('m-saldo');
  se.textContent = (saldo < 0 ? '-' : '') + fmt(saldo);
  se.className = 'mc-value ' + (saldo >= 0 ? 'c-blue' : 'c-red');
}

// ─── GRÁFICO ───────────────────────────────────────────────
function atualizarGrafico() {
  const cats = {};
  transacoes.filter(t => t.tipo === 'despesa').forEach(t => { cats[t.categoria] = (cats[t.categoria] || 0) + Number(t.valor); });
  const labels = Object.keys(cats), vals = Object.values(cats);
  if (grafico) grafico.destroy();
  if (!labels.length) return;
  grafico = new Chart(document.getElementById('grafico'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: vals, backgroundColor: CORES.slice(0, labels.length), borderWidth: 2, borderColor: document.body.classList.contains('dark') ? '#1e1e1e' : '#fff' }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 10, padding: 10 } }, tooltip: { callbacks: { label: c => ' ' + fmt(c.raw) } } } }
  });
}

// ─── RENDER TRANSAÇÕES ─────────────────────────────────────
function renderTrans() {
  const el = document.getElementById('lista-trans');
  let lista = transacoes;
  if (filtroTrans === 'receita')   lista = lista.filter(t => t.tipo === 'receita');
  else if (filtroTrans === 'despesa')   lista = lista.filter(t => t.tipo === 'despesa');
  else if (filtroTrans === 'fixa')      lista = lista.filter(t => t.tipo_recorrencia === 'fixa');
  else if (filtroTrans === 'parcelada') lista = lista.filter(t => t.tipo_recorrencia === 'parcelada');
  if (!lista.length) { el.innerHTML = '<div class="empty">Nenhuma transação</div>'; return; }
  el.innerHTML = lista.map(t => {
    const isR  = t.tipo === 'receita';
    const parc = t.tipo_recorrencia === 'parcelada' && t.total_parcelas ? ` <span class="badge badge-info">${t.parcela_atual}/${t.total_parcelas}</span>` : '';
    const fixa = t.tipo_recorrencia === 'fixa' ? ` <span class="badge badge-p">Fixa</span>` : '';
    return `<div class="item">
      <div class="item-icon" style="background:var(--${isR?'green':'red'}-bg)">${isR?'↑':'↓'}</div>
      <div class="item-body">
        <div class="item-desc">${t.descricao}${parc}${fixa}</div>
        <div class="item-meta">${t.categoria} · ${fmtDt(t.data)}</div>
      </div>
      <span class="item-val ${isR?'c-green':'c-red'}">${isR?'+':'-'}${fmt(t.valor)}</span>
      <button class="item-del" onclick="delTrans('${t.id}','${t.grupo_id||''}','${t.tipo_recorrencia||''}')">&#215;</button>
    </div>`;
  }).join('');
}

// ─── RENDER CONTAS ─────────────────────────────────────────
function renderContas() {
  const el = document.getElementById('lista-contas');
  let lista = contas;
  if (filtroContas === 'pagar')   lista = lista.filter(c => c.tipo === 'pagar');
  else if (filtroContas === 'receber') lista = lista.filter(c => c.tipo === 'receber');
  else if (filtroContas === 'pendente') lista = lista.filter(c => !c.pago);
  else if (filtroContas === 'pago')     lista = lista.filter(c =>  c.pago);
  if (!lista.length) { el.innerHTML = '<div class="empty">Nenhuma conta</div>'; return; }
  el.innerHTML = lista.map(c => {
    const d = diasAte(c.vencimento);
    const label = c.pago ? 'Quitada' : d < 0 ? `Vencida há ${Math.abs(d)}d` : d === 0 ? 'Vence hoje' : `${d}d`;
    const cor   = c.pago ? 'c-green' : d < 0 ? 'c-red' : d <= 3 ? 'c-amber' : '';
    const wpp   = c.telefone_whatsapp ? `<button class="btn-wpp" onclick="enviarWpp('${c.id}')">📲</button>` : '';
    const pBtn  = c.pago
      ? `<span class="status-pago">✓ Pago</span>`
      : `<button class="btn-pagar" onclick="marcarPago('${c.id}')">${c.tipo==='receber'?'Recebido':'Pago'}</button>`;
    return `<div class="venc-item">
      <div class="venc-body">
        <div class="venc-desc">${c.descricao}</div>
        <div class="venc-meta">
          <span class="badge ${c.tipo==='pagar'?'badge-p':'badge-info'}">${c.tipo==='pagar'?'Pagar':'Receber'}</span>
          ${c.categoria} · ${fmtDt(c.vencimento)} · <span class="${cor}">${label}</span>
        </div>
      </div>
      <div class="venc-right">
        <span class="venc-val ${c.tipo==='pagar'?'c-red':'c-green'}">${fmt(c.valor)}</span>
        <div class="venc-actions">${wpp}${pBtn}<button class="item-del" onclick="delConta('${c.id}')">&#215;</button></div>
      </div>
    </div>`;
  }).join('');
}

// ─── RESUMO CONTAS (próximas 7 dias) ───────────────────────
function renderResumoContas() {
  const el = document.getElementById('resumo-contas');
  const prox = contas.filter(c => !c.pago && diasAte(c.vencimento) <= 7 && diasAte(c.vencimento) >= 0);
  if (!prox.length) { el.innerHTML = '<div class="empty">Nenhuma conta nos próximos 7 dias</div>'; return; }
  el.innerHTML = prox.map(c => {
    const d = diasAte(c.vencimento);
    return `<div class="item">
      <div class="item-icon" style="background:var(--amber-bg)">📋</div>
      <div class="item-body">
        <div class="item-desc">${c.descricao}</div>
        <div class="item-meta">${fmtDt(c.vencimento)} · <b class="c-amber">${d===0?'Hoje':d+'d'}</b></div>
      </div>
      <span class="item-val ${c.tipo==='pagar'?'c-red':'c-green'}">${fmt(c.valor)}</span>
    </div>`;
  }).join('');
}

// ─── AVISOS ────────────────────────────────────────────────
function renderAvisos() {
  const el = document.getElementById('avisos-banner');
  const av = contas.filter(c => {
    if (c.pago) return false;
    const d = diasAte(c.vencimento);
    return d >= 0 && d <= (c.dias_aviso || 3);
  });
  if (!av.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="aviso-banner">
    <span style="font-size:18px">⚠️</span>
    <div>
      <div style="font-weight:500">Lembretes de vencimento</div>
      <div class="av-list">${av.map(c => {
        const d = diasAte(c.vencimento);
        const wpp = c.telefone_whatsapp ? `<button class="btn-wpp" style="font-size:10px;padding:2px 6px" onclick="enviarWpp('${c.id}')">📲</button>` : '';
        return `<div class="av-item"><span>${d===0?'Hoje':d+'d'}</span><span>${c.descricao} — ${fmt(c.valor)}</span>${wpp}</div>`;
      }).join('')}</div>
    </div>
  </div>`;
}

// ─── WHATSAPP ──────────────────────────────────────────────
function enviarWpp(id) {
  const c = contas.find(x => x.id === id); if (!c) return;
  const d = diasAte(c.vencimento);
  const quando = d === 0 ? 'hoje' : d === 1 ? 'amanhã' : `em ${d} dias`;
  const msg = c.tipo === 'pagar'
    ? `Olá! Lembrete: a conta "${c.descricao}" de ${fmt(c.valor)} vence ${quando} (${fmtDt(c.vencimento)}). 😊`
    : `Olá! Lembrete de recebimento: "${c.descricao}" — ${fmt(c.valor)} previsto para ${fmtDt(c.vencimento)}. 😊`;
  const tel = c.telefone_whatsapp.replace(/\D/g, '');
  window.open(`https://wa.me/55${tel}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ─── FILTROS ───────────────────────────────────────────────
function filtrar(t, el) {
  filtroTrans = t;
  document.querySelectorAll('#tab-transacoes .ftab').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); renderTrans();
}
function filtrarContas(t, el) {
  filtroContas = t;
  document.querySelectorAll('#tab-contas .ftab').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); renderContas();
}

// ─── SALVAR TRANSAÇÃO ──────────────────────────────────────
async function salvarTrans() {
  const desc  = document.getElementById('t-desc').value.trim();
  const valor = parseFloat(document.getElementById('t-valor').value);
  const cat   = document.getElementById('t-cat').value;
  const data  = document.getElementById('t-data').value;
  const rec   = document.getElementById('t-rec-toggle').checked;
  if (!desc || !valor || !cat || !data) { alert('Preencha todos os campos.'); return; }
  const btn = document.getElementById('btn-st');
  btn.textContent = 'Salvando...'; btn.disabled = true;
  let ok = true;

  if (rec && tipoRec === 'fixa') {
    const gid = crypto.randomUUID(), rows = [];
    for (let i = 0; i < 24; i++) {
      const d = new Date(data); d.setMonth(d.getMonth() + i);
      rows.push({ descricao: desc, valor, tipo: tipoTrans, categoria: cat, data: d.toISOString().split('T')[0], recorrente: true, tipo_recorrencia: 'fixa', grupo_id: gid });
    }
    const { error } = await db.from('transacoes').insert(rows);
    if (error) { alert('Erro: ' + error.message); ok = false; }

  } else if (rec && tipoRec === 'parcelada') {
    const parc = parseInt(document.getElementById('t-parcelas').value);
    if (!parc || parc < 2) { alert('Informe o número de parcelas.'); btn.textContent = 'Salvar'; btn.disabled = false; return; }
    const gid = crypto.randomUUID(), rows = [], vp = valor / parc;
    for (let i = 0; i < parc; i++) {
      const d = new Date(data); d.setMonth(d.getMonth() + i);
      rows.push({ descricao: `${desc} (${i+1}/${parc})`, valor: vp, tipo: tipoTrans, categoria: cat, data: d.toISOString().split('T')[0], recorrente: true, tipo_recorrencia: 'parcelada', total_parcelas: parc, parcela_atual: i+1, grupo_id: gid });
    }
    const { error } = await db.from('transacoes').insert(rows);
    if (error) { alert('Erro: ' + error.message); ok = false; }

  } else {
    const { error } = await db.from('transacoes').insert([{ descricao: desc, valor, tipo: tipoTrans, categoria: cat, data }]);
    if (error) { alert('Erro: ' + error.message); ok = false; }
  }

  btn.textContent = 'Salvar'; btn.disabled = false;
  if (ok) { fechar('ov-trans'); carregar(); }
}

// ─── SALVAR CONTA ──────────────────────────────────────────
async function salvarConta() {
  const desc  = document.getElementById('c-desc').value.trim();
  const valor = parseFloat(document.getElementById('c-valor').value);
  const cat   = document.getElementById('c-cat').value;
  const venc  = document.getElementById('c-venc').value;
  const aviso = parseInt(document.getElementById('c-aviso').value) || 3;
  const wpp   = document.getElementById('c-wpp').value.trim();
  if (!desc || !valor || !cat || !venc) { alert('Preencha todos os campos.'); return; }
  const btn = document.getElementById('btn-sc');
  btn.textContent = 'Salvando...'; btn.disabled = true;
  const { error } = await db.from('contas').insert([{ descricao: desc, valor, tipo: tipoConta, categoria: cat, vencimento: venc, dias_aviso: aviso, telefone_whatsapp: wpp || null }]);
  btn.textContent = 'Salvar'; btn.disabled = false;
  if (error) { alert('Erro: ' + error.message); return; }
  fechar('ov-conta'); carregar();
}

// ─── DELETAR ───────────────────────────────────────────────
async function delTrans(id, grupoId, tipoR) {
  if (grupoId && tipoR) {
    const all = confirm('Excluir TODAS as ocorrências desta transação?\n\nOK = todas | Cancelar = só esta');
    if (all) await db.from('transacoes').delete().eq('grupo_id', grupoId);
    else await db.from('transacoes').delete().eq('id', id);
  } else {
    if (!confirm('Excluir transação?')) return;
    await db.from('transacoes').delete().eq('id', id);
  }
  carregar();
}
async function delConta(id) { if (!confirm('Excluir conta?')) return; await db.from('contas').delete().eq('id', id); carregar(); }
async function marcarPago(id) { await db.from('contas').update({ pago: true }).eq('id', id); carregar(); }

// ─── INIT ──────────────────────────────────────────────────
const lbl = MESES[mes] + ' ' + ano;
document.getElementById('mes-label').textContent = lbl;
document.getElementById('mes-label2').textContent = lbl;
carregar();
</script>
